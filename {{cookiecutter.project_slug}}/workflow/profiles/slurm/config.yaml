executor: slurm

default-resources:
  slurm_account: "TODO-your-account"
  slurm_partition: "TODO-your-partition"
  mem_mb: 4000
  runtime: 60    # minutes
  # tasks: 1
  # cpus_per_task: 1

set-resources:
  hello:
    mem_mb: 512
    runtime: 10

